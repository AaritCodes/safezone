name: SafeZone Model Governance Monitor

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  governance_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check governance monitor configuration
        id: config
        env:
          SAFEZONE_BACKEND_URL: ${{ secrets.SAFEZONE_BACKEND_URL }}
          SAFEZONE_API_KEY: ${{ secrets.SAFEZONE_API_KEY }}
        run: |
          if [ -z "$SAFEZONE_BACKEND_URL" ] || [ -z "$SAFEZONE_API_KEY" ]; then
            echo "SAFEZONE_BACKEND_URL / SAFEZONE_API_KEY not configured, skipping governance monitor"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Fetch governance report
        if: steps.config.outputs.enabled == 'true'
        env:
          SAFEZONE_BACKEND_URL: ${{ secrets.SAFEZONE_BACKEND_URL }}
          SAFEZONE_API_KEY: ${{ secrets.SAFEZONE_API_KEY }}
        run: |
          curl --fail --show-error --silent \
            -H "x-api-key: $SAFEZONE_API_KEY" \
            "$SAFEZONE_BACKEND_URL/api/governance/report" > governance-report.json

      - name: Evaluate governance status
        if: steps.config.outputs.enabled == 'true'
        run: |
          node <<'NODE'
          const fs = require('fs');

          const payload = JSON.parse(fs.readFileSync('governance-report.json', 'utf8'));
          const report = (payload || {}).report || {};
          const status = String(report.status || 'unknown');
          const severity = String(report.severity || 'warning');
          const incidentClass = String(report.incidentClass || 'unknown');
          const staleInference = Boolean(report.freshness && report.freshness.inferenceStale);
          const recommendations = Array.isArray(report.recommendations)
            ? report.recommendations.slice(0, 3)
            : [];

          console.log('governance status:', status);
          console.log('governance severity:', severity);
          console.log('governance incident class:', incidentClass);

          if (recommendations.length > 0) {
            console.log('top recommendations:');
            for (const item of recommendations) {
              console.log(`- ${item}`);
            }
          }

          if (staleInference) {
            console.error('::error::Governance inference telemetry is stale. Investigate pipeline ingestion.');
            process.exit(1);
          }

          if (status === 'requires_action') {
            console.error('::error::Governance status is requires_action. Block model promotion and investigate drift/calibration.');
            process.exit(1);
          }

          if (status === 'monitoring') {
            console.log('::warning::Governance status is monitoring. Proceed with review and model-owner approval only.');
          }
          NODE

      - name: Upload governance report artifact
        if: steps.config.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: governance-report
          path: governance-report.json
