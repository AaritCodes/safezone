name: SafeZone Rollback

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Previously stable image tag to roll back to
        required: true
        type: string
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      reason:
        description: Why rollback is needed
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Print rollback metadata
        run: |
          echo "Rolling back SafeZone"
          echo "Image tag: ${{ inputs.image_tag }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Reason: ${{ inputs.reason }}"
          echo "Initiated by: ${{ github.actor }}"

      - name: Notify rollback system
        env:
          ROLLBACK_WEBHOOK: ${{ secrets.SAFEZONE_ROLLBACK_WEBHOOK_URL }}
          ROLLBACK_TOKEN: ${{ secrets.SAFEZONE_DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$ROLLBACK_WEBHOOK" ]; then
            echo "SAFEZONE_ROLLBACK_WEBHOOK_URL is not configured; exiting without external trigger"
            exit 0
          fi

          AUTH_HEADER=""
          if [ -n "$ROLLBACK_TOKEN" ]; then
            AUTH_HEADER="-H Authorization: Bearer $ROLLBACK_TOKEN"
          fi

          curl --fail --show-error --silent -X POST "$ROLLBACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            $AUTH_HEADER \
            -d '{"service":"safezone","imageTag":"${{ inputs.image_tag }}","environment":"${{ inputs.environment }}","reason":"${{ inputs.reason }}","initiatedBy":"${{ github.actor }}"}'
